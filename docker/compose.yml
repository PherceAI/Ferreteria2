services:
  postgres:
    image: postgres:16-alpine
    container_name: ferreteria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ferreteria
      POSTGRES_USER: ferreteria
      POSTGRES_PASSWORD: ferreteria_local
    ports:
      - "5432:5432"
    volumes:
      - ferreteria_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferreteria -d ferreteria"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ferreteria_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ferreteria_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ferreteria_pgdata:
  ferreteria_redisdata:
